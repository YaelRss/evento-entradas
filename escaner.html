<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Boletos - IPUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- HTML5 QRCode Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg-color: #0d0e12;
            --text-color: #f4f4f0;
            --accent-green: #28a745;
            --accent-red: #dc3545;
            --accent-yellow: #ffc107;
            --accent-blue: #3b8b8f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem 1rem;
            padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Anton', sans-serif;
            color: var(--text-color);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1a1c23;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        #reader {
            width: 100%;
            min-height: 50px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--accent-blue);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Forzar responsividad de los elementos internos generados por el plugin */
        #reader video, #reader canvas {
            max-width: 100% !important;
            height: auto !important;
            object-fit: cover;
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }

        .btn:hover {
            background: #2a6a6d;
        }

        .status-valid {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }

        .status-used {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid var(--accent-yellow);
            color: var(--accent-yellow);
        }

        .status-invalid {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
        }

        .ticket-details {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 0.5rem;
            font-weight: normal;
        }

        @media (max-width: 450px) {
            .container {
                padding: 1.2rem;
                border-radius: 10px;
            }
            body {
                padding: 1.5rem 0.8rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .btn {
                padding: 0.8rem 1rem;
                font-size: 1rem;
            }
        }
        @media (max-width: 330px) {
            /* Pantallas extremadamente pequeñas */
            .container {
                padding: 0.5rem;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
        
        /* Estilos para el Login */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }

        .login-form label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ccc;
        }

        .login-form input {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .logout-btn {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: bold;
            width: 100%;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.2);
        }

        #scanner-container {
            display: none;
        }
    </style>
</head>

<body>

    <h1>Escaner de Accesos</h1>
    <p style="color: #888; margin-bottom: 2rem;">Staff IPUM</p>

    <div class="container" id="login-container">
        <h2>Ingreso a Staff</h2>
        <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 1.5rem;">Por favor identifícate para activar el escáner.</p>
        <div class="login-form">
            <div style="display:flex; flex-direction: column; gap: 0.5rem;">
                <label>Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="staff@ipum.com">
            </div>
            <div style="display:flex; flex-direction: column; gap: 0.5rem;">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <p id="login-error" class="error-msg">Credenciales incorrectas.</p>
            <button class="btn" onclick="iniciarSesion()">Acceder</button>
        </div>
    </div>

    <div class="container" id="scanner-container">
        <div id="reader"></div>
        <button id="startBtn" class="btn" onclick="startScanner()">Iniciar Cámara</button>

        <div id="result-box">
            <span id="result-title"></span>
            <div id="result-details" class="ticket-details"></div>
        </div>

        <button class="logout-btn" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <footer style="text-align: center; padding: 3rem 2rem; padding-bottom: calc(3rem + env(safe-area-inset-bottom, 0px)); font-size: 0.8rem; letter-spacing: 2px; color: #888; text-transform: uppercase;">
        <p style="margin-bottom: 0.5rem;">A Dios sea la gloria</p>
        <p style="font-size: 0.75rem; color: #888; margin-bottom: 1rem; text-transform: none; letter-spacing: normal;">
            &copy; 2026 Evento de Jóvenes IPUM. Todos los derechos reservados.<br>
            Creada por <a href="https://rssdeveloper.com" target="_blank" rel="noopener"
                style="color: #3b8b8f; text-decoration: none;">Rss Developer</a>
        </p>
    </footer>

    <script>
        // Inicializar Supabase (Reemplazar con las reales!)
        let dbClient = null;
        try {
            const supabaseUrl = 'https://kefumnhetasvwhfkgmab.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlZnVtbmhldGFzdndoZmtnbWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE4MzUsImV4cCI6MjA5MDgxNzgzNX0.5VCYnoiT2hOMt6L5TLoRn6Xq1NleQ8-uzEN1WxitVZQ';
            if (window.supabase) {
                dbClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            }
        } catch (err) {
            console.error("Supabase init error:", err);
            alert("Error conectando a la base de datos. Verifica tu conexión o apaga AdBlockers.");
        }

        // ELEMENTOS DE UI
        const loginContainer = document.getElementById('login-container');
        const scannerContainer = document.getElementById('scanner-container');
        const loginError = document.getElementById('login-error');

        // FUNCIÓN DE LOGIN
        async function iniciarSesion() {
            if (!dbClient) return;
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const btn = document.querySelector('.login-form .btn');
            
            btn.textContent = 'Verificando...';
            btn.disabled = true;
            loginError.style.display = 'none';

            const { data, error } = await dbClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                loginError.style.display = 'block';
                loginError.textContent = 'Credenciales incorrectas o usuario no registrado.';
                btn.textContent = 'Acceder';
                btn.disabled = false;
            } else {
                verificarSesionActiva();
            }
        }

        // FUNCION DE LOGOUT
        async function cerrarSesion() {
            if (!dbClient) return;
            await dbClient.auth.signOut();
            window.location.reload(); // Recargar página tras salir
        }

        // REVISAR SI YA EXISTE SESIÓN
        async function verificarSesionActiva() {
            if (!dbClient) return false;
            const { data: { session } } = await dbClient.auth.getSession();
            if (session) {
                // Usuario validado: Esconder Login, Mostrar Scanner
                loginContainer.style.display = 'none';
                scannerContainer.style.display = 'block';
                return true;
            } else {
                loginContainer.style.display = 'block';
                scannerContainer.style.display = 'none';
                return false;
            }
        }

        let html5QrcodeScanner;
        let isProcessing = false;

        function startScanner() {
            document.getElementById('startBtn').style.display = 'none';

            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    alert("Error al acceder a la cámara: " + err);
                    document.getElementById('startBtn').style.display = 'block';
                });
        }

        async function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return; // Evitar escaneos dobles rápidos
            isProcessing = true;

            // Pausar lector mientras verificamos
            if (html5QrcodeScanner) {
                html5QrcodeScanner.pause(true);
            }

            await verifyTicket(decodedText);
        }

        function onScanFailure(error) {
            // Se ejecuta constantemente mientras enfoca, lo ignoramos
        }

        async function verifyTicket(ticketId) {
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const details = document.getElementById('result-details');

            box.style.display = 'block';
            box.className = '';
            title.textContent = 'Verificando en base de datos...';
            details.innerHTML = '';

            // Si el texto es una URL (porque el QR nuevo trae la URL completa), extraer sólo el ID
            if (ticketId.includes('?id=')) {
                ticketId = ticketId.split('?id=')[1].split('&')[0];
            }

            try {
                // Prevenir que escaneen cualquier QR (debe ser un UUID válido para buscar en bd)
                if (!ticketId || ticketId.length < 30) throw new Error("QR no es nuestro formato");

                if (!dbClient) throw new Error("Base de datos inaccesible. Apaga tu escudo Brave/AdBlocker.");

                const { data, error } = await dbClient
                    .from('tickets')
                    .select('*')
                    .eq('id', ticketId)
                    .single();

                if (error || !data) {
                    throw new Error("Boleto no encontrado");
                }

                if (data.used === true) {
                    box.classList.add('status-used');
                    title.textContent = '❌ BOLETO YA UTILIZADO';
                    details.innerHTML = `El boleto #${data.serial_number} ya fue ingresado anteriormente.<br>A nombre de: ${data.owner_name}`;
                } else {
                    // Marcar como usado
                    const { error: updateError } = await dbClient
                        .from('tickets')
                        .update({ used: true })
                        .eq('id', ticketId);

                    if (updateError) {
                        box.classList.add('status-invalid');
                        title.textContent = '⚠️ Error actualizando base de datos';
                    } else {
                        box.classList.add('status-valid');
                        title.textContent = '✅ ACCESO AUTORIZADO';
                        details.innerHTML = `Boleto N° ${data.serial_number}<br>A nombre de: <b>${data.owner_name}</b>`;
                    }
                }
            } catch (err) {
                box.classList.add('status-invalid');
                title.textContent = '🚫 BOLETO INVÁLIDO';
                details.innerHTML = 'Este código QR no pertenece a este evento o no está registrado.';
            }

            // Reactivar el escaner después de 4 segundos
            setTimeout(() => {
                box.style.display = 'none';
                isProcessing = false;
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.resume();
                } else {
                    // Si entraron directo por URL y ya se validó, ofrecer abrir camara para el siguiente
                    document.getElementById('startBtn').style.display = 'block';
                }
            }, 4000);
        }

        // Ejecutar revisión automática al cargar la página
        window.addEventListener('load', async () => {
            const hasSession = await verificarSesionActiva();
            if (!hasSession) return; // Si no hay cuenta, no avanzamos

            // Si hay sesión y además venian de la camara nativa del staff
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                document.getElementById('startBtn').style.display = 'none';
                verifyTicket(id);
                window.history.replaceState(null, '', window.location.pathname);
            }
        });
    </script>
</body>

</html>
