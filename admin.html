<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Boletos IPUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png?v=3" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="shortcut icon" href="/favicon.ico?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/site.webmanifest?v=3" />
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0d0e12;
            --text-color: #f4f4f0;
            --accent-fire: #ff5a55;
            --accent-teal: #3b8b8f;
            --card-bg: #1a1c23;
            --success-color: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 2rem;
            line-height: 1.6;
        }

        /* Fondo animado sutil */
        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(59, 139, 143, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 90, 85, 0.08) 0%, transparent 40%);
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }

        h1.title {
            font-family: 'Anton', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 2rem;
            color: var(--text-color);
            text-shadow: 0 0 30px rgba(255, 90, 85, 0.2);
        }

        .subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-teal);
            margin-top: 0.2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Pantalla de Login */
        .login-box {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .login-box h2 {
            font-family: 'Anton', sans-serif;
            letter-spacing: 1px;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            color: var(--accent-fire);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ccc;
        }

        .form-group input {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 10px rgba(59, 139, 143, 0.3);
        }

        .btn {
            background: linear-gradient(45deg, var(--accent-fire), #ff2a25);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 90, 85, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 90, 85, 0.5);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .error-msg {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 6px;
            padding: 0.7rem;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
        }

        /* Layout del Dashboard */
        #dashboard-container {
            display: none;
        }

        /* Grid de Estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-teal);
        }

        .stat-card.sales::before {
            background: var(--success-color);
        }

        .stat-card.pending::before {
            background: var(--accent-fire);
        }

        .stat-value {
            font-size: 2rem;
            font-family: 'Anton', sans-serif;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
            color: #fff;
        }

        .stat-card.sales .stat-value {
            color: var(--success-color);
            text-shadow: 0 0 15px rgba(40, 167, 105, 0.2);
        }

        .stat-card.pending .stat-value {
            color: var(--accent-fire);
            text-shadow: 0 0 15px rgba(255, 90, 85, 0.2);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            font-weight: 600;
        }

        /* Buscador y Navegación */
        .toolbar {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 0.7rem 1rem;
            padding-left: 2.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }

        .search-box svg {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab.active {
            background: var(--accent-teal);
            color: #fff;
        }

        /* Listas de Reservas */
        .list-section {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .group-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.3s;
        }

        .group-card:hover {
            border-color: rgba(59, 139, 143, 0.3);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
        }

        .buyer-email {
            font-weight: 600;
            color: var(--accent-teal);
            font-size: 1rem;
        }

        .qty-badge {
            background: rgba(59, 139, 143, 0.15);
            color: var(--accent-teal);
            border: 1px solid var(--accent-teal);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .qty-badge.pending {
            background: rgba(255, 90, 85, 0.15);
            color: var(--accent-fire);
            border-color: var(--accent-fire);
        }

        .attendee-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.8rem;
        }

        .attendee-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 0.7rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
        }

        .attendee-item svg {
            color: #888;
            flex-shrink: 0;
        }

        .attendee-name {
            color: #f4f4f0;
            font-weight: 500;
        }

        .group-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.15);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .total-amount {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .total-amount span {
            color: var(--accent-fire);
            font-family: 'Anton', sans-serif;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }

        .action-btn {
            background: var(--success-color);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
            text-transform: uppercase;
        }

        .action-btn:hover {
            background: #218838;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.4);
        }

        .action-btn.resend {
            background: var(--accent-teal);
            box-shadow: 0 4px 10px rgba(59, 139, 143, 0.2);
        }

        .action-btn.resend:hover {
            background: #2a6a6d;
            box-shadow: 0 6px 15px rgba(59, 139, 143, 0.4);
        }

        .no-records {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            color: #888;
        }

        .logout-btn-header {
            background: transparent;
            color: var(--accent-fire);
            border: 1px solid var(--accent-fire);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .logout-btn-header:hover {
            background: rgba(255, 90, 85, 0.1);
        }

        @media (max-width: 600px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .tabs {
                justify-content: center;
            }

            .group-footer {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .action-btn {
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="background-fx"></div>

    <header>
        <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem;">
            <div style="text-align: left;">
                <h1 class="title">Administración</h1>
                <div class="subtitle">Iglesia Pentecostal Unida de México</div>
            </div>
            <button id="logoutBtn" class="logout-btn-header" style="display: none;" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">
        <!-- PANTALLA DE LOGIN -->
        <div class="login-box" id="login-container">
            <h2>Acceso Administrativo</h2>
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="admin@ipum.com">
            </div>
            <div class="form-group">
                <label for="login-pass">Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <p id="login-error" class="error-msg"></p>
            <button class="btn" id="loginSubmitBtn" onclick="iniciarSesion()">Acceder</button>
        </div>

        <!-- DASHBOARD CONTAINER -->
        <div id="dashboard-container">
            <!-- Grid de Métricas -->
            <div class="stats-grid">
                <div class="stat-card sales">
                    <div class="stat-label">Ingresos Totales</div>
                    <div class="stat-value" id="stat-earnings">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Boletos Pagados</div>
                    <div class="stat-value" id="stat-paid">0</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-label">Boletos Pendientes</div>
                    <div class="stat-value" id="stat-pending">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total General</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
            </div>

            <!-- Toolbar con Buscador y Tabs -->
            <div class="toolbar">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre o correo..." oninput="filtrarLista()">
                </div>
                <div class="tabs">
                    <div class="tab active" id="tab-pending" onclick="cambiarTab('pending')">Pendientes</div>
                    <div class="tab" id="tab-paid" onclick="cambiarTab('paid')">Aprobados</div>
                </div>
            </div>

            <!-- Listado de Reservas -->
            <div class="list-section" id="list-container">
                <div class="no-records">Cargando datos...</div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const supabaseUrl = 'https://kefumnhetasvwhfkgmab.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlZnVtbmhldGFzdndoZmtnbWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE4MzUsImV4cCI6MjA5MDgxNzgzNX0.5VCYnoiT2hOMt6L5TLoRn6Xq1NleQ8-uzEN1WxitVZQ';
        let dbClient = null;

        try {
            if (window.supabase) {
                dbClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            }
        } catch (err) {
            console.error("Supabase Init Error:", err);
        }

        // Elementos UI
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('login-error');
        const listContainer = document.getElementById('list-container');

        // Estado Global
        let allTickets = [];
        let currentTab = 'pending'; // pending o paid

        // INICIAR SESIÓN
        async function iniciarSesion() {
            if (!dbClient) return;
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-pass').value;
            const submitBtn = document.getElementById('loginSubmitBtn');

            submitBtn.textContent = 'Verificando...';
            submitBtn.disabled = true;
            loginError.style.display = 'none';

            const { data, error } = await dbClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                loginError.style.display = 'block';
                loginError.textContent = 'Credenciales inválidas o no tienes permisos de administrador.';
                submitBtn.textContent = 'Acceder';
                submitBtn.disabled = false;
            } else {
                verificarSesionActiva();
            }
        }

        // CERRAR SESIÓN
        async function cerrarSesion() {
            if (!dbClient) return;
            await dbClient.auth.signOut();
            window.location.reload();
        }

        // VERIFICAR SESIÓN ACTIVA
        async function verificarSesionActiva() {
            if (!dbClient) return;
            const { data: { session } } = await dbClient.auth.getSession();
            if (session) {
                loginContainer.style.display = 'none';
                dashboardContainer.style.display = 'block';
                logoutBtn.style.display = 'block';
                cargarDatos();
            } else {
                loginContainer.style.display = 'block';
                dashboardContainer.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // CARGAR DATOS DE SUPABASE
        async function cargarDatos() {
            if (!dbClient) return;
            listContainer.innerHTML = '<div class="no-records">Cargando reservaciones...</div>';

            const { data, error } = await dbClient
                .from('tickets')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error cargando tickets:", error);
                listContainer.innerHTML = `<div class="no-records" style="color: var(--accent-fire);">Error al cargar los datos: ${error.message}</div>`;
                return;
            }

            allTickets = data || [];
            actualizarMetricas();
            renderLista();
        }

        // ACTUALIZAR MÉTRICAS DEL EVENTO
        function actualizarMetricas() {
            const total = allTickets.length;
            const paid = allTickets.filter(t => t.status === 'paid').length;
            const pending = total - paid;
            const earnings = paid * 250;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-paid').textContent = paid;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-earnings').textContent = `$${earnings.toLocaleString('es-MX')}.00`;
        }

        // CAMBIAR TAB
        function cambiarTab(tab) {
            currentTab = tab;
            document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
            document.getElementById('tab-paid').classList.toggle('active', tab === 'paid');
            renderLista();
        }

        // FILTRAR LISTA
        function filtrarLista() {
            renderLista();
        }

        // RENDER DE LISTA SEGÚN TAB Y BÚSQUEDA
        function renderLista() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            listContainer.innerHTML = '';

            // Filtrar por estado de la pestaña
            let filtered = allTickets.filter(t => t.status === currentTab);

            // Filtrar por término de búsqueda (nombre o correo)
            if (query) {
                filtered = filtered.filter(t => 
                    (t.owner_name && t.owner_name.toLowerCase().includes(query)) ||
                    (t.owner_email && t.owner_email.toLowerCase().includes(query))
                );
            }

            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="no-records">No se encontraron boletos registrados.</div>';
                return;
            }

            // Agrupar compras por correo electrónico y marcas de tiempo similares (compras en lote)
            const grouped = {};
            filtered.forEach(ticket => {
                const email = ticket.owner_email || 'sin-correo';
                // Generar una clave basada en email + los primeros 16 caracteres de la fecha de creación (año-mes-día hora:minuto)
                // Esto asegura agrupar boletos comprados juntos en la misma transacción
                const timeKey = ticket.created_at ? ticket.created_at.substring(0, 16) : 'sin-fecha';
                const groupKey = `${email}_${timeKey}`;

                if (!grouped[groupKey]) {
                    grouped[groupKey] = {
                        email: email,
                        time: timeKey,
                        tickets: []
                    };
                }
                grouped[groupKey].tickets.push(ticket);
            });

            // Dibujar tarjetas de grupo
            Object.keys(grouped).forEach(key => {
                const group = grouped[key];
                const qty = group.tickets.length;
                const total = qty * 250;
                const buyerName = group.tickets[0].owner_name || 'Desconocido';

                const card = document.createElement('div');
                card.className = 'group-card';

                // Generar lista de asistentes
                let attendeesHtml = '';
                group.tickets.forEach(ticket => {
                    attendeesHtml += `
                        <div class="attendee-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <span class="attendee-name">${ticket.owner_name}</span>
                            <span style="font-size: 0.7rem; color: #666; margin-left: auto;">N° ${ticket.serial_number ? String(ticket.serial_number).padStart(4, '0') : 'Pendiente'}</span>
                        </div>
                    `;
                });

                // Botón dinámico según tab
                let buttonHtml = '';
                if (currentTab === 'pending') {
                    buttonHtml = `
                        <button class="action-btn" onclick="aprobarPago(this, '${group.email}', '${key}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-circle-2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                            Aprobar Pago
                        </button>
                    `;
                } else {
                    buttonHtml = `
                        <button class="action-btn resend" onclick="reenviarBoletos(this, '${group.email}', '${key}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            Reenviar Correo
                        </button>
                    `;
                }

                card.innerHTML = `
                    <div class="group-header">
                        <div>
                            <span class="buyer-email">${group.email}</span>
                            <div style="font-size: 0.75rem; color: #888; margin-top: 2px;">Comprador: ${buyerName}</div>
                        </div>
                        <span class="qty-badge ${currentTab === 'pending' ? 'pending' : ''}">${qty} ${qty === 1 ? 'Boleto' : 'Boletos'}</span>
                    </div>
                    <div class="attendee-list">
                        ${attendeesHtml}
                    </div>
                    <div class="group-footer">
                        <div class="total-amount">Total: <span>$${total.toLocaleString('es-MX')}.00 MXN</span></div>
                        ${buttonHtml}
                    </div>
                `;

                // Almacenar referencias a los boletos del grupo en la tarjeta para usarlos en JS
                card.dataset.tickets = JSON.stringify(group.tickets);
                listContainer.appendChild(card);
            });
        }

        // APROBAR PAGO
        async function aprobarPago(btn, email, groupKey) {
            if (!dbClient) return;
            const card = btn.closest('.group-card');
            const tickets = JSON.parse(card.dataset.tickets);
            const ticketIds = tickets.map(t => t.id);

            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block; border: 2px solid #fff; border-top: 2px solid transparent; border-radius:50%; width:12px; height:12px; animation: spin 0.8s linear infinite; margin-right: 6px;"></span> Aprobando...';

            try {
                // 1. Actualizar el estado en la base de datos a 'paid'
                const { data: updatedTickets, error } = await dbClient
                    .from('tickets')
                    .update({ status: 'paid' })
                    .in('id', ticketIds)
                    .select();

                if (error) throw error;

                console.log(`Boletos aprobados en Supabase:`, updatedTickets);

                // 2. Disparar el envío de correo de Nodemailer mediante nuestra Netlify Function
                const mailRes = await fetch('/.netlify/functions/sendTicket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketArray: updatedTickets })
                });
                
                const mailResult = await mailRes.json();
                console.log('Resultado del envío de correo:', mailResult);

                // 3. Modificar datos en memoria para actualizar visualmente sin recargar todo
                allTickets.forEach(t => {
                    if (ticketIds.includes(t.id)) {
                        t.status = 'paid';
                    }
                });

                actualizarMetricas();
                renderLista();

            } catch (err) {
                console.error("Error al aprobar pago:", err);
                alert("Ocurrió un error al aprobar el pago: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Aprobar Pago';
            }
        }

        // REENVIAR CORREO
        async function reenviarBoletos(btn, email, groupKey) {
            const card = btn.closest('.group-card');
            const tickets = JSON.parse(card.dataset.tickets);

            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block; border: 2px solid #fff; border-top: 2px solid transparent; border-radius:50%; width:12px; height:12px; animation: spin 0.8s linear infinite; margin-right: 6px;"></span> Reenviando...';

            try {
                const mailRes = await fetch('/.netlify/functions/sendTicket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketArray: tickets })
                });

                const mailResult = await mailRes.json();
                console.log('Resultado del reenvío de correo:', mailResult);
                
                alert("¡Correo de boletos reenviado con éxito a " + email + "!");
            } catch (err) {
                console.error("Error al reenviar boletos:", err);
                alert("Ocurrió un error al enviar el correo.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    Reenviar Correo
                `;
            }
        }

        // Estilos de animación extra para el spinner
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(styleSheet);

        // Inicializar al cargar
        window.onload = function() {
            if (dbClient) {
                verificarSesionActiva();
            }
        }
    </script>
</body>

</html>
